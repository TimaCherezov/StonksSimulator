<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>StonksSimulator</title>
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/index.css">
</head>
<body>

<div id="header-mount"></div>

<div class="container">

  <div class="cards">
    <div class="card">
      <div>Мой баланс</div>
      <div class="balance" id="dashboard-balance">—</div>
      <div id="dashboard-balance-sub" class="muted-text">Войдите в аккаунт</div>
      <div class="chart"></div>
    </div>

    <div class="card" style="cursor:pointer" id="portfolio-card">
      <div>Мой портфель</div>
      <div class="balance" id="dashboard-portfolio">—</div>
      <div id="dashboard-pnl"></div>
      <div class="chart"></div>
    </div>
  </div>

  <div class="stocks">
    <div class="stocks-header">
      <h2 id="stocks-title">Топ по обороту за день</h2>
      <div class="filters">
        <button class="filter-btn active" data-filter="turnover">По обороту</button>
        <button class="filter-btn" data-filter="gainers">Растущие</button>
        <button class="filter-btn" data-filter="losers">Падающие</button>
        <button class="filter-btn" data-filter="expensive">Дорогие</button>
        <button class="filter-btn" data-filter="cheap">Дешёвые</button>
      </div>
    </div>
    <div id="stock-grid" class="stock-grid"></div>
  </div>

</div>

<script src="js/utils.js"></script>
<script src="js/components.js"></script>
<script src="js/moex.js"></script>
<script src="js/chart.js"></script>
<script src="js/api.js"></script>
<script src="js/index.js"></script>
<script type="module" src="js/auth.js"></script>

</body>
</html>
