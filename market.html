<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>StonksSimulator - Market</title>
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/market.css">
</head>
<body>

<div id="header-mount"></div>

<div class="container">

  <h1>Доступные акции</h1>

  <div class="top-row">
    <div class="filters">
      <button class="active" data-filter="all">Все</button>
      <button data-filter="gainers">Лучшая динамика</button>
      <button data-filter="expensive">Сначала дорогие</button>
      <button data-filter="cheap">Сначала дешёвые</button>
      <button data-filter="az">А → Я</button>
      <button data-filter="za">Я → А</button>
    </div>

    <label for="search-input"></label>
    <input class="search" placeholder="Поиск" id="search-input" />
  </div>

  <div id="market-grid" class="grid"></div>
  <div id="pagination" class="pagination"></div>

</div>

<script src="js/utils.js"></script>
<script src="js/components.js"></script>
<script src="js/moex.js"></script>
<script src="js/chart.js"></script>
<script src="js/market.js"></script>
<script type="module" src="js/auth.js"></script>

</body>
</html>
